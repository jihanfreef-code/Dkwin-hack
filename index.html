<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>𝐍𝐗 𝐓𝐑𝐄𝐀𝐃𝐄𝐑 • 𝐕𝐈𝐏</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #03050a;
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    #gameFrame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      z-index: 1;
      pointer-events: auto;
      opacity: 0.75;
    }

    /* floating button */
    #aiBtn {
      position: fixed;
      bottom: 25px;
      right: 15px;
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      color: white;
      text-shadow: 0 0 15px rgba(255,255,255,0.8);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      z-index: 9999;
      cursor: pointer;
      transition: 0.2s ease;
      touch-action: manipulation;
    }
    #aiBtn:active { transform: scale(0.92); }

    /* password overlay – updated design */
    #passwordOverlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10001;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }
    #passwordOverlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .password-box {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 40px;
      padding: 25px;
      width: 300px;
      text-align: center;
    }
    .brand-overlay {
      font-size: 32px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff, #ffe6b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
      text-shadow: 0 0 15px rgba(255,255,255,0.3);
    }
    .password-box input {
      width: 100%;
      padding: 15px;
      background: rgba(0,0,0,0.5);
      border: 2px solid white;
      border-radius: 30px;
      font-size: 18px;
      color: white;
      text-align: center;
      margin: 15px 0;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 900;
    }
    .password-box input::placeholder {
      color: transparent; /* no placeholder text */
    }
    .key-link {
      margin-top: 15px;
      font-size: 14px;
    }
    .key-link a {
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.15);
      padding: 8px 16px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.3);
      display: inline-block;
      font-weight: 900;
    }
    .password-box button {
      background: white;
      border: none;
      border-radius: 30px;
      padding: 12px 25px;
      font-size: 20px;
      font-weight: 900;
      color: black;
      cursor: pointer;
      margin-top: 10px;
    }

    /* main panel – white jelly liquid glass (no history) */
    #panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      width: 90%;
      max-width: 400px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(40px) saturate(300%);
      -webkit-backdrop-filter: blur(40px) saturate(300%);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 48px;
      padding: 18px 16px;
      box-shadow: 0 40px 90px rgba(0,0,0,0.9), inset 0 0 40px rgba(255,255,255,0.3);
      opacity: 0;
      pointer-events: none;
      transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10000;
      color: #fff;
    }
    #panel.active {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    .close {
      position: absolute;
      top: 12px;
      right: 20px;
      font-size: 32px;
      font-weight: 900;
      color: white;
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(5px);
      transition: 0.2s;
    }
    .close:active { background: rgba(255,255,255,0.2); transform: rotate(90deg); }

    .brand-title {
      text-align: center;
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff, #ffe6b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      text-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    .top-status {
      display: flex;
      justify-content: space-between;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      padding: 6px 12px;
      margin-bottom: 12px;
      font-size: 18px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 8px 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 900;
      color: white;
    }
    .stat-label {
      font-size: 9px;
      color: #ddd;
    }

    .confidence-container {
      margin: 12px 0;
    }
    .confidence-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: white;
    }
    .confidence-bar-bg {
      height: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .confidence-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffffff, #ffe6b3);
      border-radius: 20px;
      transition: width 1s ease;
      box-shadow: 0 0 15px rgba(255,255,255,0.5);
    }

    .prediction-main {
      text-align: center;
      margin: 12px 0;
      padding: 12px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .prediction-text {
      font-size: 56px;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 0 20px white;
    }
    .prediction-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      margin: 6px auto 0;
      border: 3px solid white;
      box-shadow: 0 0 20px white;
    }

    .last-numbers {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 10px 0;
    }
    .number-ball {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(5px);
      border: 2px solid rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      color: white;
    }

    /* history completely removed */
    .channel-link {
      text-align: center;
      margin-top: 15px;
    }
    .channel-link a {
      color: white;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(5px);
      padding: 5px 14px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.3);
      display: inline-block;
    }
  </style>
</head>
<body>

<iframe id="gameFrame" src="https://dkwin0.com/#/home"></iframe>

<div id="aiBtn">𝐍𝐗</div>

<!-- password overlay – exact design as requested -->
<div id="passwordOverlay">
  <div class="password-box">
    <div class="brand-overlay">𝐍𝐗 𝐓𝐑𝐄𝐀𝐃𝐄𝐑</div>
    <input type="password" id="passwordInput" placeholder="" autocomplete="off">
    <div class="key-link">
      <a href="https://t.me/wingofreehack01" target="_blank">🔑 For key ➡️ @wingofreehack01</a>
    </div>
    <button id="unlockBtn">প্রবেশ</button>
  </div>
</div>

<div id="panel">
  <div class="close" id="closePanel">✕</div>

  <div class="brand-title">𝐍𝐗 𝐓𝐑𝐄𝐀𝐃𝐄𝐑</div>

  <div class="top-status">
    <span id="periodDisplay">---</span>
    <span id="accuracyDisplay">0%</span>
    <span id="timerDisplay">60s</span>
  </div>

  <div class="stats-row">
    <div class="stat-item"><span class="stat-value" id="streakDisplay">0</span><span class="stat-label">STREAK</span></div>
    <div class="stat-item"><span class="stat-value" id="signalCount">0</span><span class="stat-label">SIGNALS</span></div>
    <div class="stat-item"><span class="stat-value" id="featureCount">1B</span><span class="stat-label">FEAT</span></div>
  </div>

  <div class="confidence-container">
    <div class="confidence-label">
      <span>CONFIDENCE</span>
      <span id="confidencePercent">0%</span>
    </div>
    <div class="confidence-bar-bg">
      <div class="confidence-bar-fill" id="confidenceBar"></div>
    </div>
  </div>

  <div class="prediction-main">
    <div class="prediction-text" id="mainPrediction">---</div>
    <div class="prediction-dot" id="predictionDot"></div>
  </div>

  <div class="last-numbers" id="lastNumbersContainer">
    <div class="number-ball">-</div><div class="number-ball">-</div><div class="number-ball">-</div><div class="number-ball">-</div><div class="number-ball">-</div>
  </div>

  <!-- no history section, as requested -->
  <div class="channel-link">
    <a href="https://t.me/wingofreehack01" target="_blank">📢 @wingofreehack01</a>
  </div>
</div>

<script>
  (function() {
    const panel = document.getElementById('panel');
    const aiBtn = document.getElementById('aiBtn');
    const closeBtn = document.getElementById('closePanel');
    const overlay = document.getElementById('passwordOverlay');
    const passInput = document.getElementById('passwordInput');
    const unlockBtn = document.getElementById('unlockBtn');
    
    const periodDisplay = document.getElementById('periodDisplay');
    const timerDisplay = document.getElementById('timerDisplay');
    const accuracyDisplay = document.getElementById('accuracyDisplay');
    const streakDisplay = document.getElementById('streakDisplay');
    const signalCount = document.getElementById('signalCount');
    const confidencePercent = document.getElementById('confidencePercent');
    const confidenceBar = document.getElementById('confidenceBar');
    const mainPrediction = document.getElementById('mainPrediction');
    const predictionDot = document.getElementById('predictionDot');
    const lastNumbersContainer = document.getElementById('lastNumbersContainer');

    let lastPeriod = '';
    let currentPred = null;
    let stats = { wins: 0, total: 0, streak: 0, signals: 0 };
    let lastNumbers = [];
    let timer = 60;
    let timerInterval;

    const API_URL = 'https://api.bdg88zf.com/api/webapi/GetGameIssue';
    const API_PAYLOAD = {
      typeId: 1,
      language: 0,
      random: "40079dcba93a48769c6ee9d4d4fae23f",
      signature: "D12108C4F57C549D82B23A91E0FA20AE",
      timestamp: 1727792520
    };

    // password unlock once
    let unlocked = false;

    aiBtn.addEventListener('click', () => {
      if (!unlocked) {
        overlay.classList.add('active');
      } else {
        panel.classList.add('active');
        aiBtn.style.opacity = '0.2';
      }
    });

    unlockBtn.addEventListener('click', () => {
      if (passInput.value === 'nxvipbot') {
        unlocked = true;
        overlay.classList.remove('active');
        passInput.value = '';
        panel.classList.add('active');
        aiBtn.style.opacity = '0.2';
      } else {
        alert('❌ ভুল পাসওয়ার্ড');
      }
    });

    closeBtn.addEventListener('click', () => {
      panel.classList.remove('active');
      aiBtn.style.opacity = '1';
    });

    function setTimer(value) {
      timerDisplay.innerText = value + 's';
      const hue = (value / 60) * 120;
      timerDisplay.style.color = `hsl(${hue}, 90%, 65%)`;
    }

    function startTimer() {
      setTimer(timer);
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timer--;
        if (timer < 0) timer = 60;
        setTimer(timer);
      }, 1000);
    }

    function updateBalls() {
      const balls = lastNumbersContainer.children;
      for (let i = 0; i < 5; i++) {
        if (i < lastNumbers.length) {
          const num = lastNumbers[i];
          balls[i].innerText = num;
          balls[i].style.background = num >= 5 ? 'rgba(255,200,50,0.3)' : 'rgba(80,255,120,0.3)';
          balls[i].style.borderColor = num >= 5 ? '#ffcc00' : '#88ff88';
        } else {
          balls[i].innerText = '-';
          balls[i].style.background = 'rgba(255,255,255,0.1)';
          balls[i].style.borderColor = 'rgba(255,255,255,0.4)';
        }
      }
    }

    // billion feature simulation + 7-14 cycle
    function generatePrediction(period, cyclePosition) {
      const last = parseInt(period.slice(-1)) || 0;
      const second = parseInt(period.slice(-2, -1)) || 0;
      
      let bigScore = 0;
      for (let i = 0; i < 31623; i++) {
        bigScore += Math.sin(last * i) * 0.000000001;
        bigScore += Math.cos(second * i) * 0.000000001;
      }

      let cycleAdjust = 1;
      if (cyclePosition < 7) cycleAdjust = 1.02;
      else cycleAdjust = 0.98;

      const finalScore = bigScore * cycleAdjust;
      const isBig = finalScore > 0;
      const conf = 85 + Math.floor(Math.random() * 10);

      return {
        pred: isBig ? 'BIG' : 'SMALL',
        conf: Math.min(99, conf)
      };
    }

    async function fetchPeriod() {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(API_PAYLOAD)
        });
        const data = await response.json();
        if (data?.data?.issueNumber) return data.data.issueNumber.toString();
      } catch (e) {}
      const now = new Date();
      return now.getFullYear() + '' + (now.getMonth()+1) + '' + now.getDate() + '' + now.getHours() + '' + now.getMinutes() + '' + now.getSeconds();
    }

    let cycleCounter = 0;

    async function update() {
      const period = await fetchPeriod();
      const short = period.slice(-3);
      periodDisplay.innerText = short;

      if (period !== lastPeriod) {
        timer = 60;

        if (currentPred) {
          const actualNum = parseInt(period.slice(-1));
          const actual = actualNum >= 5 ? 'BIG' : 'SMALL';
          const win = (currentPred.pred === actual);

          stats.total++;
          if (win) {
            stats.wins++;
            stats.streak++;
          } else {
            stats.streak = 0;
          }

          stats.signals = Math.floor(stats.wins * 0.95);
          accuracyDisplay.innerText = Math.round((stats.wins / stats.total) * 100) + '%';
          streakDisplay.innerText = stats.streak;
          signalCount.innerText = stats.signals;

          lastNumbers.unshift(actualNum);
          if (lastNumbers.length > 5) lastNumbers.pop();
          updateBalls();
          // history removed – no display
        }

        cycleCounter = (cycleCounter + 1) % 14;

        const newPred = generatePrediction(period, cycleCounter);
        currentPred = newPred;

        mainPrediction.innerText = newPred.pred;
        mainPrediction.style.color = newPred.pred === 'BIG' ? '#ffcc00' : '#88ff88';
        predictionDot.style.background = newPred.pred === 'BIG' ? '#ffcc00' : '#88ff88';

        confidencePercent.innerText = newPred.conf + '%';
        confidenceBar.style.width = newPred.conf + '%';

        lastPeriod = period;
      }

      setTimeout(update, 1000);
    }

    startTimer();
    update();
  })();
</script>
</body>
  </html>
